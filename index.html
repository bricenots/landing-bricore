<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta - Mi Emprendimiento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
            margin-top: 20px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            margin-top: 20px;
        }
        
        .loading {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #bee5eb;
            margin-top: 20px;
        }
        
        .required {
            color: #e74c3c;
        }
        
        .version-info {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Mi Emprendimiento</h1>
        <p class="subtitle">Ayúdanos a conocerte mejor completando esta breve encuesta</p>
        
        <form id="surveyForm">
            <div class="form-group">
                <label for="nombre">Nombre completo <span class="required">*</span></label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ingresa tu nombre completo">
            </div>
            
            <div class="form-group">
                <label for="email">Correo electrónico <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label for="telefono">WhatsApp (con código de país) <span class="required">*</span></label>
                <input type="tel" id="telefono" name="telefono" required placeholder="+57 300 123 4567">
            </div>
            
            <div class="form-group">
                <label for="edad">Rango de edad <span class="required">*</span></label>
                <select id="edad" name="edad" required>
                    <option value="">Selecciona tu rango de edad</option>
                    <option value="18-25">18-25 años</option>
                    <option value="26-35">26-35 años</option>
                    <option value="36-45">36-45 años</option>
                    <option value="46-55">46-55 años</option>
                    <option value="56+">56+ años</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="interes">¿Qué te interesa más? <span class="required">*</span></label>
                <select id="interes" name="interes" required>
                    <option value="">Selecciona una opción</option>
                    <option value="productos">Productos</option>
                    <option value="servicios">Servicios</option>
                    <option value="precios">Precios competitivos</option>
                    <option value="calidad">Alta calidad</option>
                    <option value="innovacion">Innovación</option>
                    <option value="atencion">Atención al cliente</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="comentarios">¿Cómo nos conociste?</label>
                <textarea id="comentarios" name="comentarios" rows="3" placeholder="Redes sociales, recomendación, búsqueda en Google, etc."></textarea>
            </div>
            
            <button type="submit" id="submitBtn">Enviar Encuesta</button>
        </form>
        
        <div id="message"></div>
        
        <div style="text-align: center; margin-top: 30px; color: #666; font-size: 14px;">
            <p>🔒 Tus datos están seguros y protegidos</p>
            <p>📱 Recibirás una confirmación por WhatsApp</p>
        </div>
        
        <div class="version-info">
            <p>🔄 Versión GitHub - Despliegue automático activado</p>
            <p>📅 Última actualización: <span id="lastUpdate"></span></p>
        </div>
    </div>

    <script>
        // Configuración de la API
        const CONFIG = {
            // Cambiar a true cuando tengas la API lista
            USE_REAL_API: false,
            API_URL: 'https://PENDIENTE-CONFIGURAR.execute-api.us-east-1.amazonaws.com/prod/encuesta'
        };
        
        // Mostrar fecha de última actualización
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('es-ES');
        
        document.getElementById('surveyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            // Deshabilitar botón y mostrar loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            
            messageDiv.innerHTML = '<div class="loading">📤 Enviando tu encuesta...</div>';
            
            const formData = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                edad: document.getElementById('edad').value,
                interes: document.getElementById('interes').value,
                comentarios: document.getElementById('comentarios').value,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };
            
            if (CONFIG.USE_REAL_API) {
                // Usar API real
                try {
                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.success) {
                        messageDiv.innerHTML = `
                            <div class="success">
                                <h3>¡Gracias ${formData.nombre}! 🎉</h3>
                                <p>Tu encuesta ha sido guardada exitosamente en la base de datos.</p>
                                <p>📱 Pronto recibirás una confirmación en WhatsApp al ${formData.telefono}</p>
                                <p>📧 También te enviaremos información a ${formData.email}</p>
                                <p><small>ID: ${result.customerId}</small></p>
                            </div>
                        `;
                        
                        // Limpiar formulario
                        document.getElementById('surveyForm').reset();
                    } else {
                        throw new Error(result.message || 'Error desconocido');
                    }
                    
                } catch (error) {
                    console.error('Error:', error);
                    messageDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Error al enviar</h3>
                            <p>No se pudo procesar tu encuesta. Por favor intenta de nuevo.</p>
                            <p><small>${error.message}</small></p>
                        </div>
                    `;
                }
            } else {
                // Modo simulación
                setTimeout(() => {
                    messageDiv.innerHTML = `
                        <div class="success">
                            <h3>¡Gracias ${formData.nombre}! 🎉</h3>
                            <p>Tu encuesta ha sido procesada exitosamente.</p>
                            <p>📱 Pronto recibirás una confirmación en WhatsApp al ${formData.telefono}</p>
                            <p>📧 También te enviaremos información a ${formData.email}</p>
                            <p><small>⚠️ Modo simulación - Los datos no se guardan aún</small></p>
                        </div>
                    `;
                    
                    // Limpiar formulario
                    document.getElementById('surveyForm').reset();
                    
                    // Log para desarrollo
                    console.log('Datos de la encuesta (simulación):', formData);
                    
                }, 2000);
            }
            
            // Rehabilitar botón
            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Encuesta';
            }, 2000);
        });
        
        // Validación en tiempo real
        document.getElementById('telefono').addEventListener('input', function(e) {
            let value = e.target.value;
            if (value && !value.startsWith('+')) {
                e.target.value = '+' + value.replace(/[^\d]/g, '');
            }
        });
    </script>
</body>
</html>
